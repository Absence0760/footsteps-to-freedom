<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Contact Submissions</title>

    <!-- Tailwind CSS - Uses local copy if available, falls back to CDN -->
    <script src="/assets/css/tailwind.js" onerror="this.onerror=null; this.src='https://cdn.tailwindcss.com'"></script>

    <!-- HTMX - Uses local copy if available, falls back to CDN -->
    <script src="/assets/js/htmx.min.js" onerror="this.onerror=null; this.src='https://unpkg.com/htmx.org@1.9.10'"></script>

    <!-- Alpine.js - Uses local copy if available, falls back to CDN -->
    <script defer src="/assets/js/alpine.min.js" onerror="this.onerror=null; this.src='https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js'"></script>

    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50" x-data="adminApp()" x-init="checkAuth()">
    <!-- Login Screen -->
    <div x-show="!authenticated" x-cloak class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold text-gray-900">Admin Login</h2>
                <p class="text-gray-600 mt-2">Enter your credentials to continue</p>
            </div>

            <div x-show="error" class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded mb-4">
                <p x-text="error"></p>
            </div>

            <form @submit.prevent="login()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text"
                           x-model="username"
                           required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password"
                           x-model="password"
                           required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <button type="submit"
                        :disabled="loading"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 disabled:opacity-50">
                    <span x-show="!loading">Login</span>
                    <span x-show="loading">Logging in...</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div x-show="authenticated" x-cloak>
        <!-- Navigation -->
        <nav class="bg-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <h1 class="text-2xl font-bold text-blue-600">Admin Dashboard</h1>
                    </div>
                    <div class="flex items-center">
                        <button @click="logout()"
                                class="text-gray-700 hover:text-red-600 px-3 py-2 rounded-md text-sm font-medium">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Header -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-3xl font-bold text-gray-900">Contact Submissions</h2>
                        <p class="text-gray-600 mt-2">Manage and review contact form submissions</p>
                    </div>
                    <button @click="loadContacts()"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                        Refresh
                    </button>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6">
                <div class="flex space-x-2">
                    <button @click="filter = 'all'"
                            :class="filter === 'all' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'"
                            class="px-4 py-2 rounded-lg font-medium transition duration-200">
                        All
                    </button>
                    <button @click="filter = 'new'"
                            :class="filter === 'new' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'"
                            class="px-4 py-2 rounded-lg font-medium transition duration-200">
                        New
                    </button>
                    <button @click="filter = 'read'"
                            :class="filter === 'read' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'"
                            class="px-4 py-2 rounded-lg font-medium transition duration-200">
                        Read
                    </button>
                    <button @click="filter = 'responded'"
                            :class="filter === 'responded' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'"
                            class="px-4 py-2 rounded-lg font-medium transition duration-200">
                        Responded
                    </button>
                </div>
            </div>

            <!-- Contacts List -->
            <div id="contacts-list" class="space-y-4">
                <template x-if="loadingContacts">
                    <div class="flex items-center justify-center py-12">
                        <div class="text-center">
                            <svg class="mx-auto h-12 w-12 text-gray-400 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <p class="mt-4 text-gray-500">Loading contacts...</p>
                        </div>
                    </div>
                </template>

                <template x-if="!loadingContacts && filteredContacts.length === 0">
                    <div class="bg-white rounded-lg shadow-md p-12 text-center">
                        <svg class="mx-auto h-16 w-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                        </svg>
                        <h3 class="mt-4 text-lg font-medium text-gray-900">No contact submissions</h3>
                        <p class="mt-2 text-gray-500">Contact submissions will appear here when people fill out your contact form.</p>
                    </div>
                </template>

                <template x-for="contact in filteredContacts" :key="contact.ID">
                    <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition duration-200 cursor-pointer"
                         @click="openContact(contact)">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center space-x-3 mb-2">
                                    <h3 class="text-lg font-bold text-gray-900" x-text="contact.name"></h3>
                                    <span :class="{
                                        'bg-green-100 text-green-800': contact.status === 'new',
                                        'bg-blue-100 text-blue-800': contact.status === 'read',
                                        'bg-purple-100 text-purple-800': contact.status === 'responded'
                                    }" class="px-2 py-1 rounded-full text-xs font-semibold" x-text="contact.status"></span>
                                </div>
                                <p class="text-sm text-gray-600 mb-2">
                                    <a :href="'mailto:' + contact.email"
                                       class="text-blue-600 hover:underline"
                                       @click.stop
                                       x-text="contact.email"></a>
                                </p>
                                <p class="text-sm font-medium text-gray-700 mb-2" x-show="contact.subject">
                                    Subject: <span x-text="contact.subject"></span>
                                </p>
                                <p class="text-gray-700 line-clamp-2" x-text="contact.message"></p>
                            </div>
                            <div class="text-right ml-4">
                                <p class="text-xs text-gray-500" x-text="formatDate(contact.CreatedAt)"></p>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <!-- Contact Detail Modal -->
        <div x-show="selectedContact"
             x-cloak
             class="fixed inset-0 z-50 overflow-y-auto"
             style="display: none;">
            <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
                <!-- Background overlay -->
                <div @click="selectedContact = null"
                     x-transition:enter="ease-out duration-300"
                     x-transition:enter-start="opacity-0"
                     x-transition:enter-end="opacity-100"
                     x-transition:leave="ease-in duration-200"
                     x-transition:leave-start="opacity-100"
                     x-transition:leave-end="opacity-0"
                     class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75"></div>

                <!-- Modal panel -->
                <div x-transition:enter="ease-out duration-300"
                     x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                     x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                     x-transition:leave="ease-in duration-200"
                     x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                     x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                     class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                    <template x-if="selectedContact">
                        <div>
                            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                                <div class="flex justify-between items-start mb-4">
                                    <h3 class="text-2xl font-bold text-gray-900">Contact Details</h3>
                                    <button @click="selectedContact = null" class="text-gray-400 hover:text-gray-600">
                                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                        </svg>
                                    </button>
                                </div>

                                <div class="space-y-4">
                                    <div>
                                        <label class="text-sm font-medium text-gray-500">Name</label>
                                        <p class="text-gray-900 font-semibold" x-text="selectedContact.name"></p>
                                    </div>
                                    <div>
                                        <label class="text-sm font-medium text-gray-500">Email</label>
                                        <p class="text-gray-900" x-text="selectedContact.email"></p>
                                    </div>
                                    <div x-show="selectedContact.subject">
                                        <label class="text-sm font-medium text-gray-500">Subject</label>
                                        <p class="text-gray-900" x-text="selectedContact.subject"></p>
                                    </div>
                                    <div>
                                        <label class="text-sm font-medium text-gray-500">Message</label>
                                        <p class="text-gray-900 whitespace-pre-wrap" x-text="selectedContact.message"></p>
                                    </div>
                                    <div class="flex items-center space-x-4">
                                        <div>
                                            <label class="text-sm font-medium text-gray-500">Status</label>
                                            <p class="text-gray-900">
                                                <span :class="{
                                                    'bg-green-100 text-green-800': selectedContact.status === 'new',
                                                    'bg-blue-100 text-blue-800': selectedContact.status === 'read',
                                                    'bg-purple-100 text-purple-800': selectedContact.status === 'responded'
                                                }" class="px-2 py-1 rounded-full text-xs font-semibold" x-text="selectedContact.status"></span>
                                            </p>
                                        </div>
                                        <div>
                                            <label class="text-sm font-medium text-gray-500">Submitted</label>
                                            <p class="text-gray-900 text-sm" x-text="formatDate(selectedContact.CreatedAt)"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse space-x-reverse space-x-2">
                                <button @click="updateStatus(selectedContact.ID, 'responded')"
                                        class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-purple-600 text-base font-medium text-white hover:bg-purple-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">
                                    Mark as Responded
                                </button>
                                <button @click="updateStatus(selectedContact.ID, 'read')"
                                        class="mt-3 w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                                    Mark as Read
                                </button>
                                <button @click="deleteContact(selectedContact.ID)"
                                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-red-600 hover:bg-red-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                                    Delete
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adminApp() {
            return {
                authenticated: false,
                loading: false,
                loadingContacts: false,
                username: '',
                password: '',
                error: '',
                contacts: [],
                filter: 'all',
                selectedContact: null,

                async checkAuth() {
                    try {
                        const response = await fetch('/api/admin/check');
                        if (response.ok) {
                            this.authenticated = true;
                            this.loadContacts();
                        }
                    } catch (error) {
                        console.log('Not authenticated');
                    }
                },

                async login() {
                    this.loading = true;
                    this.error = '';

                    try {
                        const response = await fetch('/api/admin/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                username: this.username,
                                password: this.password
                            })
                        });

                        if (response.ok) {
                            this.authenticated = true;
                            this.username = '';
                            this.password = '';
                            this.loadContacts();
                        } else {
                            const data = await response.json();
                            this.error = data.error || 'Login failed';
                        }
                    } catch (error) {
                        this.error = 'An error occurred. Please try again.';
                    } finally {
                        this.loading = false;
                    }
                },

                async logout() {
                    try {
                        await fetch('/api/admin/logout', { method: 'POST' });
                        this.authenticated = false;
                        this.contacts = [];
                    } catch (error) {
                        console.error('Logout error:', error);
                    }
                },

                async loadContacts() {
                    this.loadingContacts = true;
                    try {
                        const response = await fetch('/api/admin/contacts');
                        if (response.ok) {
                            this.contacts = await response.json();
                        } else if (response.status === 401) {
                            this.authenticated = false;
                        }
                    } catch (error) {
                        console.error('Error loading contacts:', error);
                    } finally {
                        this.loadingContacts = false;
                    }
                },

                get filteredContacts() {
                    if (this.filter === 'all') {
                        return this.contacts;
                    }
                    return this.contacts.filter(c => c.status === this.filter);
                },

                openContact(contact) {
                    this.selectedContact = contact;
                },

                async updateStatus(id, status) {
                    try {
                        const response = await fetch(`/api/admin/contacts/${id}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ status })
                        });

                        if (response.ok) {
                            this.selectedContact = null;
                            this.loadContacts();
                        } else if (response.status === 401) {
                            this.authenticated = false;
                        } else {
                            alert('Failed to update status');
                        }
                    } catch (error) {
                        console.error('Error updating status:', error);
                        alert('Error updating status');
                    }
                },

                async deleteContact(id) {
                    if (!confirm('Are you sure you want to delete this contact submission?')) {
                        return;
                    }

                    try {
                        const response = await fetch(`/api/admin/contacts/${id}`, {
                            method: 'DELETE'
                        });

                        if (response.ok || response.status === 204) {
                            this.selectedContact = null;
                            this.loadContacts();
                        } else if (response.status === 401) {
                            this.authenticated = false;
                        } else {
                            alert('Failed to delete contact');
                        }
                    } catch (error) {
                        console.error('Error deleting contact:', error);
                        alert('Error deleting contact');
                    }
                },

                formatDate(dateString) {
                    const date = new Date(dateString);
                    return date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            }
        }
    </script>
</body>
</html>
