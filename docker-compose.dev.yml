# Development overrides for docker-compose.yml
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - APP_PORT=3000
      - ENV=development
      - DATABASE_URL=postgres://appuser:change_this_password@postgres:5432/appdb?sslmode=disable
      - STATIC_PATH=/app/frontend  # Serve from mounted volume in dev
    volumes:
      - ./backend:/app/backend:cached  # Mount backend source for hot reload
      - ./frontend:/app/frontend:cached  # Mount frontend for live updates
      - ./.air.toml:/app/.air.toml:ro  # Mount Air config
      - /app/backend/tmp  # Exclude tmp directory from mount
    working_dir: /app/backend
    command: air -c /app/.air.toml
